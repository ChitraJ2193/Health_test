name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  sonarcloud-analysis:
    runs-on: ubuntu-latest
    container:
      image: openjdk:17
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      # 1. Install Sonar Scanner
      - name: Install Sonar Scanner
        run: |
          apt-get update && apt-get install -y wget unzip jq curl
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.zip
          unzip sonar-scanner-cli-5.0.zip

      # 2. Run Sonar Scanner (project is at root level)
      - name: Run Sonar Scanner
        env:
          _IOS_SONAR_TOKEN: ${{ secrets._IOS_SONAR_TOKEN }}
        run: |
          ./sonar-scanner-5.0/bin/sonar-scanner \
          -Dsonar.login=${_IOS_SONAR_TOKEN} \
          -Dsonar.host.url=https://sonarcloud.io

      # 3. Quality Gate Check (block if not A / not Passed)
      - name: Check Quality Gate
        id: check-quality-gate
        env:
          _IOS_SONAR_TOKEN: ${{ secrets._IOS_SONAR_TOKEN }}
        run: |
          STATUS=$(curl -u ${_IOS_SONAR_TOKEN}: \
          "https://sonarcloud.io/api/qualitygates/project_status?projectKey=zorgm.ai-ios" \
          | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            echo "❌ Quality Gate FAILED — merge blocked!"
            exit 1
          fi

          echo "✅ Quality Gate PASSED — clean Swift code!"

